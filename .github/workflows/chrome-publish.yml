name: Chrome Web Store Publish

on:
  push:
    tags:
      - "spooky/v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      chrome_version: ${{ steps.meta.outputs.chrome_version }}
      version_name: ${{ steps.meta.outputs.version_name }}
    steps:
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/spooky/v}"
          echo "version_name=$TAG" >> "$GITHUB_OUTPUT"

          # Chrome only allows X.Y.Z.W with integers.
          # Convert pre-release like 0.26.0-canary.19 â†’ 0.26.0.19
          CHROME_VERSION=$(echo "$TAG" | sed -E 's/-[a-zA-Z]+\.([0-9]+)$/.\1/')
          echo "chrome_version=$CHROME_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  publish-devtools:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject version into manifest.json
        run: |
          jq \
            --arg v "${{ needs.prepare.outputs.chrome_version }}" \
            --arg vn "${{ needs.prepare.outputs.version_name }}" \
            '.version = $v | .version_name = $vn' \
            apps/devtools/manifest.json > tmp.json && mv tmp.json apps/devtools/manifest.json

      - name: Build devtools extension
        run: pnpm --filter @spooky-sync/devtools build

      - name: Package extension zip
        run: cd apps/devtools/dist && zip -r ../devtools.zip .

      - name: Authenticate with Google
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Upload to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -T apps/devtools/devtools.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Publish to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}/publish")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Publish failed with HTTP $HTTP_CODE"
            exit 1
          fi
