name: Docker Publish

on:
  push:
    tags:
      - "sp00ky/v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_canary: ${{ steps.meta.outputs.is_canary }}
    steps:
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/sp00ky/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if echo "$TAG" | grep -q "canary"; then
            echo "is_canary=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_canary=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - image: mono424/spooky-ssp
            target: ssp
            platform: linux/amd64
            runner: ubuntu-latest
          - image: mono424/spooky-ssp
            target: ssp
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: mono424/spooky-scheduler
            target: scheduler
            platform: linux/amd64
            runner: ubuntu-latest
          - image: mono424/spooky-scheduler
            target: scheduler
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=spooky-rust-${{ matrix.platform }}
            type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,scope=spooky-rust-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image == 'mono424/spooky-ssp' && 'ssp' || 'scheduler' }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: mono424/spooky-ssp
            artifact_prefix: ssp
          - image: mono424/spooky-scheduler
            artifact_prefix: scheduler
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.artifact_prefix }}-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.artifact_prefix }}-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ matrix.image }}:${{ needs.prepare.outputs.version }}"
          if [ "${{ needs.prepare.outputs.is_canary }}" = "true" ]; then
            TAGS="$TAGS,${{ matrix.image }}:canary"
          else
            TAGS="$TAGS,${{ matrix.image }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAG_ARGS=$(echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | xargs -I {} echo "-t {}" | tr '\n' ' ')
          docker buildx imagetools create $TAG_ARGS \
            $(printf '${{ matrix.image }}@sha256:%s ' *)
