name: Docker Publish

on:
  push:
    tags:
      - "spooky/v*"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_canary: ${{ steps.meta.outputs.is_canary }}
    steps:
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/spooky/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if echo "$TAG" | grep -q "canary"; then
            echo "is_canary=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_canary=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: mono424/spooky-ssp
            dockerfile: apps/ssp/Dockerfile
          - image: mono424/spooky-scheduler
            dockerfile: apps/scheduler/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ matrix.image }}:${{ needs.prepare.outputs.version }}"
          if [ "${{ needs.prepare.outputs.is_canary }}" = "true" ]; then
            TAGS="$TAGS,${{ matrix.image }}:canary"
          else
            TAGS="$TAGS,${{ matrix.image }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
