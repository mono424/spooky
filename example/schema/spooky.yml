mode: cluster # "singlenode", "cluster", or "surrealism"
buckets:
  - ./src/buckets/profile.surql
clientTypes:
  - format: typescript
    output: ../app-solid/src/schema.gen.ts
    schema: ./src/schema.surql
  - format: dart
    output: ../client-dart/src/db/models.dart
    schema: ./src/schema.surql
backends:
  api:
    type: http
    spec: ../api/openapi.yml
    baseUrl: http://host.docker.internal:3660
    dev:
      type: npm
      script: dev
      workdir: ../api
    auth:
      type: token
      token: THIS_IS_TOP_SECRET
    method:
      type: outbox
      table: job
      schema: ./src/outbox/api.surql
