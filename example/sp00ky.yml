mode: cluster # "singlenode", "cluster", or "surrealism"
surrealdb:
  namespace: main
  database: example
  # username: root       # SurrealDB auth username (default: root)
  # password: root       # SurrealDB auth password (default: root)
  # hosting: cloud      # "cloud" (default) or "external"
  # endpoint: "wss://my-surreal.example.com"  # required when hosting: external
# cloudApi: "https://staging-api.sp00ky.cloud"  # override Sp00ky Cloud API endpoint
devApp: dev:app # runs: pnpm --filter @example/app-solid dev (Solid.js frontend)
schema: ./schema
buckets:
  - ./schema/src/buckets/profile.surql
clientTypes:
  - format: typescript
    output: ./app-solid/src/schema.gen.ts
  - format: dart
    output: ./client-dart/src/db/models.dart
backends:
  api:
    # hosting: cloud    # "cloud" (default) or "external" (self-hosted at baseUrl)
    type: http
    spec: ./api/openapi.yml
    baseUrl: http://host.docker.internal:3660
    dev:
      type: npm
      script: dev
      workdir: ./api
    auth:
      type: token
      token: THIS_IS_TOP_SECRET
    method:
      type: outbox
      table: job
      schema: ./schema/src/outbox/api.surql
