# yaml-language-server: $schema=https://sp00ky.cloud/schema/sp00ky.schema.json
mode: cluster # "singlenode", "cluster", or "surrealism"
cloudApi: https://api-stg.sp00ky.cloud # override Sp00ky Cloud API endpoint
slug: threads
surrealdb:
  namespace: main
  database: example
  # username: root       # SurrealDB auth username (default: root)
  # password: root       # SurrealDB auth password (default: root)
  # hosting: cloud      # "cloud" (default) or "external"
  # endpoint: "wss://my-surreal.example.com"  # required when hosting: external
schema: ./schema
version:
  dev: dev
  cloud: dev
buckets:
  - ./schema/src/buckets/profile.surql
clientTypes:
  - format: typescript
    output: ./app-solid/src/schema.gen.ts
  - format: dart
    output: ./client-dart/src/db/models.dart
apps:
  web:
    type: frontend
    dev:
      type: npm
      script: dev:app
    deploy:
      dockerfile: ./app-solid/Dockerfile
      context: ../
      port: 80
    env:
      dev: '.env.local'
      vault:
        - 'VITE_DB_ENDPOINT'
  api:
    type: backend
    # hosting: cloud    # "cloud" (default) or "external" (self-hosted at baseUrl)
    spec: ./api/openapi.yml
    baseUrl: http://host.docker.internal:3660
    dev:
      type: npm
      script: dev
      workdir: ./api
    deploy:
      dockerfile: ./api/Dockerfile
      context: ../
      port: 3660
      healthcheck: /health
    auth:
      type: token
      token: THIS_IS_TOP_SECRET
    method:
      type: outbox
      table: job
      schema: ./schema/src/outbox/api.surql
    env:
      dev: '.env.local'
      cloud:
        vault:
          - 'ANTHROPIC_API_KEY'
          - 'API_AUTH_TOKEN'
